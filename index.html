<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간 181 </title>
    <meta property="og:title" content="월간 181 ">
    <meta property="og:description" content="181구역의 소중한 기록들을 모아놓은 디지털 매거진 서재입니다.">
    <meta property="og:image" content="covers/1.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --shelf-wood: #5d4037;
            --shelf-shadow: #3e2723;
            --bg-color: #f5f5f5;
            --text-color: #333;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Gowun Batang', serif; color: var(--text-color); }
        header {
            text-align: center; padding: 50px 20px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('bgm/header_bg.jpg') center/cover;
            color: white; min-height: 200px; display: flex; flex-direction: column; justify-content: center;
        }
        header h1 { font-size: 3rem; margin: 0; letter-spacing: 5px; }
        header p { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }
        .search-container { max-width: 600px; margin: -30px auto 30px; padding: 0 20px; }
        #search-input {
            width: 100%; padding: 15px 25px; border-radius: 30px; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 1.1rem; outline: none;
        }
        .shelf-container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px;
        }
        .book-card {
            position: relative; background: white; border-radius: 8px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: all 0.3s ease;
            cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column;
        }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        .cover-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-bottom: 2px solid #eee; }
        .book-info { padding: 20px; flex-grow: 1; }
        .book-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 8px; color: var(--shelf-shadow); }
        .book-summary {
            font-size: 0.95rem; color: #666; line-height: 1.5; margin-bottom: 15px;
            height: 4.5em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { font-size: 0.75rem; background: #f0f0f0; padding: 3px 8px; border-radius: 12px; color: #888; }
        footer { text-align: center; padding: 50px 20px; color: #999; font-size: 0.9rem; }
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .shelf-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
            .book-info { padding: 12px; }
            .book-title { font-size: 1.1rem; }
            .book-summary { display: none; }
        }
    </style>
</head>
<body>
    <header><h1>월간 181 </h1><p>181구역의 소중한 기록들을 모아놓은 디지털 매거진 서재입니다.</p></header>
    <div class="search-container"><input type="text" id="search-input" placeholder="검색어를 입력하세요..."></div>
    <main class="shelf-container" id="shelf"></main>
    <footer>&copy; 181 AREA ARCHIVE.</footer>
    <script>
        const VOL_DATA = [{"id": "vol1", "label": "2025년 12월호 (창간호)", "tags": ["창간", "기드온", "항아리"], "summary": "기드온 300용사:시선의 전환.", "pages": ["1 (1).jpg", "1 (2).jpg", "1 (3).jpg", "1 (4).jpg", "1 (5).jpg", "1 (6).jpg", "1 (7).jpg", "1 (8).jpg", "1 (9).jpg", "1 (10).jpg", "1 (11).jpg", "1 (12).jpg", "1 (13).jpg", "1 (14).jpg", "1 (15).jpg"], "cover": "1.jpg", "buildTime": 1769437523, "hasBgm": true, "hasPdf": false, "bgmRange": [1, 999], "sermonTitle": "12월호: 소속인가, 증거인가? (로마서 12:1-2)", "hasRadio": true}, {"id": "vol2", "label": "2026년 1월호 (신년호)", "tags": ["신년", "결심", "구별"], "summary": "세상과 구별.", "pages": ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg", "18.jpg", "19.jpg", "20.jpg"], "cover": "2.jpg", "buildTime": 1769437523, "hasBgm": true, "hasPdf": false, "bgmRange": [1, 999], "sermonTitle": "1월호: 그리스도인의 구별 (출애굽기11장)", "hasRadio": true}];
        const shelf = document.getElementById('shelf');
        const searchInput = document.getElementById('search-input');
        function renderBooks(filter = '') {
            shelf.innerHTML = '';
            const query = filter.toLowerCase();
            VOL_DATA.forEach(vol => {
                const searchStr = (vol.label + vol.summary + vol.tags.join(' ')).toLowerCase();
                if (searchStr.includes(query)) {
                    const card = document.createElement('a');
                    card.href = vol.id + '/index.html';
                    card.className = 'book-card';
                    card.innerHTML = `
                        <img src="covers/${vol.cover || '1.jpg'}?v=${vol.buildTime}" class="cover-img">
                        <div class="book-info">
                            <div class="book-title">${vol.label}</div>
                            <div class="book-summary">${vol.summary}</div>
                            <div class="tags">${vol.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
                        </div>`;
                    shelf.appendChild(card);
                }
            });
        }
        searchInput.addEventListener('input', (e) => renderBooks(e.target.value));
        renderBooks();
    </script>
</body>
</html>
